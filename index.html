<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우리집 스마트 가계부</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FEE500">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; transition: background-color 0.3s ease; }
        body.light { background-color: #f3f4f6; }
        body.dark { background-color: #191919; } 
        
        .kakao-bg { background-color: #FEE500; }
        .kakao-text { color: #191919; }
        .kakao-border { border-color: #FEE500; }
        
        .tab-btn.active { border-bottom: 5px solid #FEE500; color: #191919; font-weight: 900; }
        .dark .tab-btn.active { border-bottom: 5px solid #FEE500; color: #FEE500; font-weight: 900; text-shadow: 0 0 8px rgba(254, 229, 0, 0.4); }
        
        .category-btn.selected { background-color: #FFF8B3; border-color: #FEE500; color: #191919; font-weight: 900; transform: scale(1.02); border-width: 3px; }
        .dark .category-btn.selected { background-color: #4A4315; border-color: #FEE500; color: #FEE500; }
        
        .type-btn.selected-expense { background-color: #fee2e2; border-color: #ef4444; color: #b91c1c; }
        .dark .type-btn.selected-expense { background-color: #7f1d1d; border-color: #f87171; color: #fca5a5; }
        .type-btn.selected-income { background-color: #dbeafe; border-color: #3b82f6; color: #1d4ed8; }
        .dark .type-btn.selected-income { background-color: #1e3a8a; border-color: #60a5fa; color: #bfdbfe; }
        
        button, input, select, label { touch-action: manipulation; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        ::-webkit-scrollbar-track { background: transparent; }
        .progress-bar-fill { transition: width 0.5s ease-in-out, background-color 0.5s ease-in-out; }
    </style>
</head>
<body class="text-[#191919] antialiased light">

<div class="max-w-md mx-auto bg-white dark:bg-[#222222] min-h-screen shadow-lg flex flex-col relative overflow-hidden transition-colors duration-300">
    
    <header class="kakao-bg dark:bg-[#111111] px-4 sm:px-5 py-3 border-b border-[#E5CD00] dark:border-gray-800 sticky top-0 z-20 flex justify-between items-center shadow-md transition-colors duration-300">
        <h1 class="text-2xl sm:text-3xl font-black kakao-text dark:text-[#FEE500] whitespace-nowrap shrink-0 transition-colors duration-300">🏠 가계부</h1>
        <div class="flex items-center gap-2 sm:gap-3 shrink-0">
            <div id="server-status" class="flex items-center gap-1 text-xs font-black text-gray-700 dark:text-gray-300 bg-white/70 dark:bg-gray-800 px-2 py-1 rounded-full shadow-inner whitespace-nowrap">
                <span class="w-2.5 h-2.5 rounded-full bg-red-500" id="status-dot"></span>서버
            </div>
            <button onclick="toggleDarkMode()" class="text-[#191919] dark:text-[#FEE500] p-1.5 rounded-full hover:bg-black/10 dark:hover:bg-gray-700 transition">
                <i id="dark-mode-icon" class="fa-solid fa-moon text-xl"></i>
            </button>
            <div onclick="openUserModal()" class="flex items-center gap-1.5 cursor-pointer bg-white dark:bg-[#333333] px-3 py-1.5 rounded-full active:bg-gray-100 transition shadow-sm border border-gray-200 dark:border-gray-700 max-w-[120px]">
                <i class="fa-solid fa-user-circle text-[#191919] dark:text-[#FEE500] text-xl shrink-0"></i>
                <span id="current-user-name" class="font-black text-[#191919] dark:text-white text-base truncate">로딩중</span>
            </div>
        </div>
    </header>

    <div class="flex border-b dark:border-gray-700 text-lg sm:text-xl bg-white dark:bg-[#222222] shrink-0 z-10 relative transition-colors duration-300">
        <button onclick="switchTab('input')" id="tab-input" class="tab-btn active flex-1 py-4 text-center text-gray-500 dark:text-gray-300 font-bold transition whitespace-nowrap">기록하기</button>
        <button onclick="switchTab('list')" id="tab-list" class="tab-btn flex-1 py-4 text-center text-gray-500 dark:text-gray-300 font-bold transition whitespace-nowrap">내역/통계</button>
        <button onclick="switchTab('car')" id="tab-car" class="tab-btn flex-1 py-4 text-center text-gray-500 dark:text-gray-300 font-bold transition whitespace-nowrap">차계부</button>
    </div>

    <!-- 1. 입력 화면 -->
    <main id="view-input" class="p-4 sm:p-5 flex-1 overflow-y-auto pb-24 dark:bg-[#222222] transition-colors duration-300">
        <div class="flex gap-3 mb-5">
            <button onclick="setType('expense')" id="btn-type-expense" class="type-btn selected-expense flex-1 py-4 rounded-2xl border-2 border-gray-200 dark:border-gray-700 text-xl sm:text-2xl font-black text-gray-700 dark:text-gray-300 transition shadow-sm bg-white dark:bg-gray-800 whitespace-nowrap">
                <i class="fa-solid fa-minus-circle mr-1.5"></i>지출
            </button>
            <button onclick="setType('income')" id="btn-type-income" class="type-btn flex-1 py-4 rounded-2xl border-2 border-gray-200 dark:border-gray-700 text-xl sm:text-2xl font-black text-gray-700 dark:text-gray-300 transition shadow-sm bg-white dark:bg-gray-800 whitespace-nowrap">
                <i class="fa-solid fa-plus-circle mr-1.5"></i>수입
            </button>
        </div>

        <div class="mb-5 bg-gray-50 dark:bg-[#2A2A2A] p-4 rounded-2xl border-2 border-gray-200 dark:border-gray-700 transition-colors duration-300 shadow-sm">
            <label id="label-date" class="block text-xl font-black text-[#191919] dark:text-white mb-2">언제 쓰셨나요?</label>
            <input type="date" id="input-date" class="w-full px-4 py-3 text-xl font-black border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:outline-none focus:border-[#FEE500] dark:focus:border-[#FEE500] bg-white dark:bg-[#191919] dark:text-white transition-colors duration-300">
        </div>

        <div class="mb-5 bg-gray-50 dark:bg-[#2A2A2A] p-4 rounded-2xl border-2 border-gray-200 dark:border-gray-700 transition-colors duration-300 shadow-sm">
            <div class="flex justify-between items-center mb-3 gap-2">
                <label id="label-amount" class="block text-xl font-black text-[#191919] dark:text-white shrink-0">얼마인가요?</label>
                <label class="bg-[#FEE500] text-[#191919] px-3 py-2 rounded-xl font-black text-sm sm:text-base shadow-md active:bg-[#e6cf00] cursor-pointer transition flex items-center shrink-0 whitespace-nowrap">
                    <i class="fa-solid fa-camera mr-1.5 text-lg"></i> 스캔
                    <input type="file" accept="image/*" capture="environment" id="input-camera" class="hidden" onchange="uploadReceipt(this)">
                </label>
            </div>
            <div class="relative">
                <input type="number" id="input-amount" placeholder="0" class="w-full px-4 py-4 text-3xl sm:text-4xl font-black text-right border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:outline-none focus:border-[#FEE500] dark:focus:border-[#FEE500] bg-white dark:bg-[#191919] dark:text-white transition-colors duration-300">
                <span class="absolute right-4 top-1/2 transform -translate-y-1/2 text-2xl sm:text-3xl font-black text-gray-500 dark:text-gray-400">원</span>
            </div>
        </div>

        <div class="mb-5 bg-gray-50 dark:bg-[#2A2A2A] p-4 rounded-2xl border-2 border-gray-200 dark:border-gray-700 transition-colors duration-300 shadow-sm">
            <label id="label-category" class="block text-xl font-black text-[#191919] dark:text-white mb-3">어디에 쓰셨나요?</label>
            <div id="category-expense" class="grid grid-cols-3 gap-2">
                <button class="category-btn selected py-4 rounded-xl border-2 border-gray-200 dark:border-gray-700 text-base sm:text-lg font-bold text-gray-700 dark:text-gray-300 flex flex-col items-center gap-1 bg-white dark:bg-[#191919] transition whitespace-nowrap" data-cat="식비"><span class="text-3xl">🍚</span>식비</button>
                <button class="category-btn py-4 rounded-xl border-2 border-gray-200 dark:border-gray-700 text-base sm:text-lg font-bold text-gray-700 dark:text-gray-300 flex flex-col items-center gap-1 bg-white dark:bg-[#191919] transition whitespace-nowrap" data-cat="장보기"><span class="text-3xl">🛒</span>장보기</button>
                <button class="category-btn py-4 rounded-xl border-2 border-gray-200 dark:border-gray-700 text-base sm:text-lg font-bold text-gray-700 dark:text-gray-300 flex flex-col items-center gap-1 bg-white dark:bg-[#191919] transition whitespace-nowrap" data-cat="병원/약"><span class="text-3xl">💊</span>병원/약</button>
                <button class="category-btn py-4 rounded-xl border-2 border-gray-200 dark:border-gray-700 text-base sm:text-lg font-bold text-gray-700 dark:text-gray-300 flex flex-col items-center gap-1 bg-white dark:bg-[#191919] transition whitespace-nowrap" data-cat="교통/차량"><span class="text-3xl">🚗</span>차량</button>
                <button class="category-btn py-4 rounded-xl border-2 border-gray-200 dark:border-gray-700 text-base sm:text-lg font-bold text-gray-700 dark:text-gray-300 flex flex-col items-center gap-1 bg-white dark:bg-[#191919] transition whitespace-nowrap" data-cat="공과금"><span class="text-3xl">💡</span>공과금</button>
                <button class="category-btn py-4 rounded-xl border-2 border-gray-200 dark:border-gray-700 text-base sm:text-lg font-bold text-gray-700 dark:text-gray-300 flex flex-col items-center gap-1 bg-white dark:bg-[#191919] transition whitespace-nowrap" data-cat="기타지출"><span class="text-3xl">🎁</span>기타</button>
            </div>
            <div id="category-income" class="grid grid-cols-3 gap-2 hidden">
                <button class="category-btn py-4 rounded-xl border-2 border-gray-200 dark:border-gray-700 text-base sm:text-lg font-bold text-gray-700 dark:text-gray-300 flex flex-col items-center gap-1 bg-white dark:bg-[#191919] transition whitespace-nowrap" data-cat="월급"><span class="text-3xl">💼</span>월급</button>
                <button class="category-btn py-4 rounded-xl border-2 border-gray-200 dark:border-gray-700 text-base sm:text-lg font-bold text-gray-700 dark:text-gray-300 flex flex-col items-center gap-1 bg-white dark:bg-[#191919] transition whitespace-nowrap" data-cat="연금"><span class="text-3xl">🏦</span>연금</button>
                <button class="category-btn py-4 rounded-xl border-2 border-gray-200 dark:border-gray-700 text-base sm:text-lg font-bold text-gray-700 dark:text-gray-300 flex flex-col items-center gap-1 bg-white dark:bg-[#191919] transition whitespace-nowrap" data-cat="용돈"><span class="text-3xl">💌</span>용돈</button>
                <button class="category-btn py-4 rounded-xl border-2 border-gray-200 dark:border-gray-700 text-base sm:text-lg font-bold text-gray-700 dark:text-gray-300 flex flex-col items-center gap-1 bg-white dark:bg-[#191919] transition whitespace-nowrap" data-cat="이자수익"><span class="text-3xl">📈</span>이자</button>
                <button class="category-btn py-4 rounded-xl border-2 border-gray-200 dark:border-gray-700 text-base sm:text-lg font-bold text-gray-700 dark:text-gray-300 flex flex-col items-center gap-1 bg-white dark:bg-[#191919] transition whitespace-nowrap" data-cat="기타수입"><span class="text-3xl">🎁</span>기타</button>
            </div>
            
            <label class="flex items-center mt-5 p-4 bg-white dark:bg-[#191919] rounded-xl border-2 border-gray-300 dark:border-gray-700 shadow-sm cursor-pointer active:bg-gray-100 dark:active:bg-gray-800 transition">
                <input type="checkbox" id="input-fixed" class="w-7 h-7 text-[#FEE500] rounded border-gray-400 mr-3 focus:ring-[#FEE500] shrink-0">
                <span id="label-fixed" class="text-lg sm:text-xl font-black text-[#191919] dark:text-white">매달 나가는 <strong class="text-red-500 dark:text-red-400">고정 지출</strong>이에요.</span>
            </label>
        </div>

        <div class="mb-6">
            <label class="block text-xl font-black text-[#191919] dark:text-white mb-2">메모 (선택)</label>
            <input id="input-memo" type="text" placeholder="어디서 쓰셨나요?" class="w-full px-4 py-4 text-xl font-bold border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:outline-none focus:border-[#FEE500] dark:focus:border-[#FEE500] bg-white dark:bg-[#191919] dark:text-white transition-colors duration-300">
        </div>

        <button onclick="saveData()" class="w-full kakao-bg text-[#191919] font-black text-2xl sm:text-3xl py-5 rounded-2xl shadow-xl active:bg-[#e5cd00] transition">
            서버에 저장하기
        </button>
    </main>

    <!-- 2. 내역/통계 화면 -->
    <main id="view-list" class="p-4 sm:p-5 flex-1 hidden bg-gray-50 dark:bg-[#222222] overflow-y-auto pb-24 transition-colors duration-300">
        <div class="flex justify-between items-center mb-5 gap-2">
            <h2 class="text-2xl sm:text-3xl font-black text-[#191919] dark:text-white truncate"><span id="stats-user-name" class="text-[#FEE500] drop-shadow-md">누구</span>의 이번 달</h2>
            <button onclick="downloadExcel()" class="bg-green-600 text-white px-3 py-2 rounded-xl font-black text-sm sm:text-base shadow-md active:bg-green-700 transition shrink-0 whitespace-nowrap">
                <i class="fa-solid fa-file-excel mr-1"></i>엑셀
            </button>
        </div>
        
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-white dark:bg-[#2A2A2A] p-4 rounded-2xl shadow-md border-2 border-red-100 dark:border-red-900/50 text-center transition-colors">
                <p class="text-gray-600 dark:text-gray-300 font-black mb-1 text-base sm:text-lg">총 지출</p>
                <p class="text-2xl sm:text-3xl font-black text-red-600 dark:text-red-400 truncate" id="total-expense">0</p>
            </div>
            <div class="bg-white dark:bg-[#2A2A2A] p-4 rounded-2xl shadow-md border-2 border-blue-100 dark:border-blue-900/50 text-center transition-colors">
                <p class="text-gray-600 dark:text-gray-300 font-black mb-1 text-base sm:text-lg">총 수입</p>
                <p class="text-2xl sm:text-3xl font-black text-blue-600 dark:text-blue-400 truncate" id="total-income">0</p>
            </div>
        </div>

        <div class="bg-white dark:bg-[#2A2A2A] p-5 rounded-2xl shadow-md mb-6 border-2 border-gray-200 dark:border-gray-700 transition-colors">
            <h3 class="text-xl sm:text-2xl font-black text-[#191919] dark:text-white mb-3 text-center">어디에 가장 많이 썼을까요?</h3>
            <div class="relative h-48 w-full flex justify-center">
                <canvas id="expensePieChart"></canvas>
            </div>
        </div>
        
        <div class="flex justify-between items-center mb-3">
            <h3 class="text-xl sm:text-2xl font-black text-[#191919] dark:text-white">상세 내역</h3>
            <button onclick="fetchTransactions()" class="kakao-bg text-[#191919] px-3 py-1.5 rounded-lg font-black text-sm sm:text-base shadow-sm active:bg-[#e5cd00] whitespace-nowrap"><i class="fa-solid fa-rotate-right mr-1"></i>새로고침</button>
        </div>
        <div id="transaction-list"></div>
    </main>

    <!-- 3. 차량 관리 화면 -->
    <main id="view-car" class="p-4 sm:p-5 flex-1 hidden bg-gray-50 dark:bg-[#222222] overflow-y-auto pb-24 transition-colors duration-300">
        <div class="flex justify-between items-center mb-5 bg-white dark:bg-[#2A2A2A] p-2 sm:p-3 rounded-2xl shadow-md border-2 border-gray-200 dark:border-gray-700 transition-colors">
            <select id="vehicle-select" onchange="changeVehicle(this.value)" class="bg-transparent text-[#191919] dark:text-[#FEE500] text-xl sm:text-2xl font-black focus:outline-none block w-full px-2 py-1 truncate">
            </select>
            <div class="flex gap-1.5 sm:gap-2 shrink-0 pr-1">
                <button onclick="uiPromptAddVehicle()" class="kakao-bg text-[#191919] p-2.5 rounded-xl active:bg-[#e5cd00] text-xl transition shadow"><i class="fa-solid fa-plus-circle"></i></button>
                <button onclick="uiConfirmDeleteVehicle()" class="bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 p-2.5 rounded-xl active:bg-red-100 text-xl transition shadow"><i class="fa-solid fa-trash-can"></i></button>
            </div>
        </div>

        <div id="car-content" class="hidden">
            <div class="text-center mb-6 mt-2">
                <h2 id="display-car-name" class="text-3xl sm:text-4xl font-black text-[#191919] dark:text-white transition whitespace-nowrap">차량 이름</h2>
                <div id="display-car-plate" class="inline-block mt-2 bg-[#191919] dark:bg-[#FEE500] text-[#FEE500] dark:text-[#191919] font-black px-4 py-1.5 rounded-xl text-lg sm:text-xl shadow-lg border-2 border-[#191919] dark:border-[#FEE500] whitespace-nowrap">12가 3456</div>
            </div>

            <div class="bg-white dark:bg-[#2A2A2A] p-5 rounded-2xl shadow-md mb-6 border-2 border-gray-200 dark:border-gray-700 transition">
                <label class="block text-[#191919] dark:text-white font-black text-xl mb-3">현재 계기판 주행거리</label>
                <div class="flex flex-col gap-3 w-full">
                    <div class="relative w-full">
                        <input type="number" id="car-current-km" class="w-full px-4 py-4 text-3xl font-black text-right border-2 border-gray-300 dark:border-gray-600 rounded-xl focus:outline-none focus:border-[#FEE500] bg-gray-50 dark:bg-[#191919] dark:text-white transition">
                        <span class="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500 font-black text-xl">km</span>
                    </div>
                    <button onclick="updateMileage()" class="kakao-bg text-[#191919] font-black w-full py-4 rounded-xl text-xl active:bg-[#e5cd00] shadow-md transition whitespace-nowrap">
                        업데이트
                    </button>
                </div>
            </div>

            <h3 class="text-xl sm:text-2xl font-black text-[#191919] dark:text-white mb-3">소모품 교체 주기</h3>
            <div id="consumables-list" class="space-y-4"></div>
        </div>
        
        <div id="no-car-message" class="text-center py-12 hidden">
            <div class="text-6xl mb-4">🚗</div>
            <p class="text-xl sm:text-2xl font-black text-[#191919] dark:text-white mb-2 whitespace-nowrap">등록된 차량이 없습니다.</p>
            <p class="text-base sm:text-lg font-bold text-gray-500 dark:text-gray-400">상단의 [+] 버튼을 눌러 추가해주세요.</p>
        </div>
    </main>

    <!-- 모달: 가족 설정 -->
    <div id="user-modal" class="fixed inset-0 bg-black bg-opacity-70 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white dark:bg-[#2A2A2A] w-full max-w-sm mx-auto rounded-3xl shadow-2xl p-6 flex flex-col transition-colors border-4 border-[#FEE500]" style="max-h: 80vh;">
            <h2 class="text-2xl sm:text-3xl font-black text-[#191919] dark:text-white mb-5 text-center shrink-0">누가 기록하시나요?</h2>
            <div id="user-list" class="flex-1 overflow-y-auto space-y-3 mb-5 pr-2"></div>
            <div class="flex gap-2 mb-5 shrink-0">
                <input type="text" id="new-user-name" placeholder="새 가족 이름" class="w-full min-w-0 border-2 border-gray-300 dark:border-gray-600 bg-white dark:bg-[#191919] dark:text-white rounded-xl px-4 py-3 font-black text-lg focus:outline-none focus:border-[#FEE500] transition">
                <button onclick="addUser()" class="kakao-bg text-[#191919] px-5 rounded-xl font-black text-lg active:bg-[#e5cd00] shrink-0 transition shadow whitespace-nowrap">추가</button>
            </div>
            <button onclick="closeUserModal()" class="w-full py-4 bg-gray-200 dark:bg-gray-700 text-[#191919] dark:text-white font-black text-xl rounded-2xl active:bg-gray-300 transition shadow whitespace-nowrap">닫기</button>
        </div>
    </div>

    <!-- 범용 확인 창 -->
    <div id="custom-confirm" class="fixed inset-0 bg-black bg-opacity-70 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-[#2A2A2A] rounded-3xl p-6 sm:p-8 w-full max-w-sm text-center shadow-2xl transition-colors border-4 border-[#FEE500]">
            <p id="confirm-msg" class="text-xl sm:text-2xl font-black mb-6 text-[#191919] dark:text-white whitespace-pre-line leading-relaxed"></p>
            <div class="flex gap-3">
                <button onclick="closeConfirmModal()" class="flex-1 py-4 bg-gray-200 dark:bg-gray-700 text-[#191919] dark:text-white rounded-xl font-black text-lg sm:text-xl active:bg-gray-300 transition whitespace-nowrap">취소</button>
                <button id="confirm-ok-btn" class="flex-1 py-4 kakao-bg text-[#191919] rounded-xl font-black text-lg sm:text-xl active:bg-[#e5cd00] transition shadow whitespace-nowrap">확인</button>
            </div>
        </div>
    </div>

    <!-- 기타 모달 (등록/수정) -->
    <div id="custom-prompt-car" class="fixed inset-0 bg-black bg-opacity-70 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-[#2A2A2A] rounded-3xl p-6 sm:p-8 w-full max-w-sm shadow-2xl transition-colors border-4 border-[#FEE500]">
            <h2 class="text-2xl sm:text-3xl font-black text-[#191919] dark:text-white mb-5 text-center">차량 등록</h2>
            <div class="mb-4">
                <label class="block font-black text-lg sm:text-xl text-[#191919] dark:text-gray-200 mb-2">차량 이름</label>
                <input type="text" id="prompt-car-name" class="w-full border-2 border-gray-300 dark:border-gray-600 bg-white dark:bg-[#191919] dark:text-white rounded-xl p-3 sm:p-4 text-xl font-black transition focus:border-[#FEE500]">
            </div>
            <div class="mb-6">
                <label class="block font-black text-lg sm:text-xl text-[#191919] dark:text-gray-200 mb-2">차량 번호</label>
                <input type="text" id="prompt-car-plate" class="w-full border-2 border-gray-300 dark:border-gray-600 bg-white dark:bg-[#191919] dark:text-white rounded-xl p-3 sm:p-4 text-xl font-black transition focus:border-[#FEE500]">
            </div>
            <div class="flex gap-3">
                <button onclick="closePromptCar()" class="flex-1 py-4 bg-gray-200 dark:bg-gray-700 text-[#191919] dark:text-white rounded-xl font-black text-lg sm:text-xl active:bg-gray-300 transition">취소</button>
                <button onclick="executeAddVehicle()" class="flex-1 py-4 kakao-bg text-[#191919] rounded-xl font-black text-lg sm:text-xl active:bg-[#e5cd00] transition">등록</button>
            </div>
        </div>
    </div>

    <!-- 숫자(또는 텍스트) 입력 수정 창 -->
    <div id="custom-prompt-num" class="fixed inset-0 bg-black bg-opacity-70 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-[#2A2A2A] rounded-3xl p-6 sm:p-8 w-full max-w-sm shadow-2xl transition-colors border-4 border-[#FEE500]">
            <h2 id="prompt-num-title" class="text-xl sm:text-2xl font-black text-[#191919] dark:text-white mb-5 text-center">수정</h2>
            <!-- 금액용/일반용(메모) 분리 처리하기 위해 타입을 text로 통일 후 JS에서 변환 -->
            <input type="text" id="prompt-num-input" class="w-full border-2 border-gray-300 dark:border-gray-600 bg-white dark:bg-[#191919] dark:text-white rounded-xl p-4 text-2xl sm:text-3xl font-black text-center mb-6 focus:border-[#FEE500] transition">
            <div class="flex gap-3">
                <button onclick="closePromptNum()" class="flex-1 py-4 bg-gray-200 dark:bg-gray-700 text-[#191919] dark:text-white rounded-xl font-black text-lg sm:text-xl active:bg-gray-300 transition">취소</button>
                <button id="prompt-num-ok-btn" class="flex-1 py-4 kakao-bg text-[#191919] rounded-xl font-black text-lg sm:text-xl active:bg-[#e5cd00] transition">저장</button>
            </div>
        </div>
    </div>

    <!-- 토스트 메시지 -->
    <div id="toast" class="fixed bottom-24 left-1/2 transform -translate-x-1/2 kakao-bg text-[#191919] px-5 py-3 rounded-full text-lg font-black shadow-2xl opacity-0 pointer-events-none transition-opacity duration-300 z-[70] whitespace-nowrap border-2 border-[#191919]">
        ✅ 성공!
    </div>
</div>

<script>
    // 🔥 서버 주소를 정확하게 입력하세요 (끝에 / 빼고)
    const API_BASE_URL = "https://port-0-family-ledger-backend-movgah4ae40856c6.sel3.cloudtype.app";
    
    let state = {
        currentUser: '',
        users: ['어머니', '아버지', '아들', '딸'],
        transactions: [],
        vehicles: [], 
        kakaoMap: {}, 
        currentVehicleId: null,
        currentType: 'expense',
        currentCategory: '식비',
        isDarkMode: false
    };

    const defaultConsumables = [
        { id: 'oil', name: '엔진오일', icon: 'fa-oil-can', cycle: 10000, lastKm: 0, desc: '1만km / 1년' },
        { id: 'filter', name: '에어컨 필터', icon: 'fa-fan', cycle: 10000, lastKm: 0, desc: '1만km / 6개월' },
        { id: 'pad', name: '브레이크 패드', icon: 'fa-circle-stop', cycle: 40000, lastKm: 0, desc: '3~4만km' },
        { id: 'fluid', name: '브레이크 오일', icon: 'fa-droplet', cycle: 40000, lastKm: 0, desc: '4만km / 2년' },
        { id: 'tire', name: '타이어', icon: 'fa-ring', cycle: 50000, lastKm: 0, desc: '5만km / 3년' },
        { id: 'battery', name: '배터리', icon: 'fa-car-battery', cycle: 60000, lastKm: 0, desc: '6만km / 3년' },
        { id: 'mission', name: '미션오일', icon: 'fa-gears', cycle: 80000, lastKm: 0, desc: '8~10만km' }
    ];

    let pieChartInstance = null;
    let backPressedOnce = false;

    window.addEventListener('popstate', function(event) {
        if (event.state && event.state.tab) {
            switchTabUI(event.state.tab);
        } else {
            if (!backPressedOnce) {
                history.pushState({ tab: 'input' }, "", ""); 
                showToast("뒤로 가기를 한 번 더 누르시면 종료됩니다.");
                backPressedOnce = true;
                setTimeout(() => { backPressedOnce = false; }, 2000);
            } else {
                window.history.back();
            }
        }
    });

    function switchTab(tabName) {
        if (history.state && history.state.tab !== tabName) {
            history.pushState({ tab: tabName }, "", "");
        }
        localStorage.setItem('family_ledger_last_tab', tabName);
        switchTabUI(tabName);
    }

    function switchTabUI(tabName) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('main').forEach(main => main.classList.add('hidden'));
        document.getElementById('tab-' + tabName).classList.add('active');
        document.getElementById('view-' + tabName).classList.remove('hidden');

        if(tabName === 'list') fetchTransactions();
        if(tabName === 'car') renderCar();
    }

    /* =====================================================================
       [서버 동기화 (강력한 이중화 캐시 무력화 적용)]
       ===================================================================== */
    let ws;

    function connectWebSocket() {
        if(!API_BASE_URL) return;
        const wsProtocol = API_BASE_URL.startsWith("https") ? "wss://" : "ws://";
        const wsUrl = API_BASE_URL.replace(/^https?:\/\//, wsProtocol) + "/ws";
        try {
            ws = new WebSocket(wsUrl);
            ws.onmessage = (event) => {
                if(event.data.includes("SYS_REFRESH")) {
                    fetchSettings(); fetchTransactions();
                } else {
                    showToast("🔔 " + event.data);
                    fetchTransactions(); 
                }
            };
            ws.onclose = () => { setTimeout(connectWebSocket, 3000); };
        } catch (error) { console.log("웹소켓 연결 실패. 폴링 유지"); }
    }

    // 5초마다 무조건 서버와 통신 (동기화 지연 방지)
    setInterval(() => {
        fetchTransactions();
        fetchSettings();
    }, 5000);

    function updateServerStatus(isOnline) {
        const dot = document.getElementById('status-dot');
        if (isOnline) { dot.classList.remove('bg-red-500'); dot.classList.add('bg-green-500'); } 
        else { dot.classList.remove('bg-green-500'); dot.classList.add('bg-red-500'); }
    }

    async function fetchTransactions() {
        if(!API_BASE_URL) return updateServerStatus(false);
        try {
            const ts = new Date().getTime(); // 캐시 완전 무력화
            const response = await fetch(`${API_BASE_URL}/api/transactions?t=${ts}`, { cache: 'no-store' });
            if (response.ok) {
                state.transactions = await response.json();
                updateServerStatus(true);
                if(document.getElementById('view-list').classList.contains('hidden') === false) renderList();
            } else { updateServerStatus(false); }
        } catch (error) { updateServerStatus(false); }
    }

    async function fetchSettings() {
        if(!API_BASE_URL) return;
        try {
            const ts = new Date().getTime(); // 캐시 완전 무력화
            const resU = await fetch(`${API_BASE_URL}/api/settings/users?t=${ts}`, { cache: 'no-store' });
            if(resU.ok) {
                const dataU = await resU.json();
                if(dataU.value) {
                    const parsed = JSON.parse(dataU.value);
                    if(parsed && parsed.length > 0) {
                        state.users = parsed;
                        localStorage.setItem('family_ledger_users', JSON.stringify(state.users));
                    }
                    if(!state.users.includes(state.currentUser)) {
                        state.currentUser = state.users[0];
                        updateUIForUser();
                    }
                }
            }
            
            const resK = await fetch(`${API_BASE_URL}/api/settings/kakao_map?t=${ts}`, { cache: 'no-store' });
            if(resK.ok) {
                const dataK = await resK.json();
                if(dataK.value) {
                    state.kakaoMap = JSON.parse(dataK.value);
                    localStorage.setItem('family_ledger_kakao', JSON.stringify(state.kakaoMap));
                }
            }
            
            const resV = await fetch(`${API_BASE_URL}/api/settings/vehicles?t=${ts}`, { cache: 'no-store' });
            if(resV.ok) {
                const dataV = await resV.json();
                if(dataV.value) {
                    const parsed = JSON.parse(dataV.value);
                    if(parsed) {
                        state.vehicles = parsed;
                        localStorage.setItem('family_ledger_vehicles', JSON.stringify(state.vehicles));
                    }
                    if(document.getElementById('view-car').classList.contains('hidden') === false) renderCar();
                }
            }
        } catch (error) { console.warn("설정 동기화 지연", error); }
    }

    async function saveSettings(key, valueObj) {
        localStorage.setItem(`family_ledger_${key}`, JSON.stringify(valueObj));
        if(!API_BASE_URL) return;
        try {
            const res = await fetch(`${API_BASE_URL}/api/settings/${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ value: JSON.stringify(valueObj) })
            });
            if(res.ok) { await fetchSettings(); } 
            else { showToast("⚠️ 서버 반영 지연"); }
        } catch (error) { showToast("⚠️ 오프라인 임시저장됨"); }
    }

    /* =====================================================================
       [초기화 및 공통 로직]
       ===================================================================== */
    window.addEventListener('load', async () => {
        const localUsers = localStorage.getItem('family_ledger_users');
        if(localUsers) state.users = JSON.parse(localUsers);
        const localVehicles = localStorage.getItem('family_ledger_vehicles');
        if(localVehicles) state.vehicles = JSON.parse(localVehicles);
        const localKakao = localStorage.getItem('family_ledger_kakao');
        if(localKakao) state.kakaoMap = JSON.parse(localKakao);

        const lastTab = localStorage.getItem('family_ledger_last_tab') || 'input';
        history.pushState({ tab: lastTab }, "", "");
        switchTabUI(lastTab);

        initTheme(); 
        document.getElementById('input-date').valueAsDate = new Date();
        
        await fetchSettings();
        await fetchTransactions();
        
        const savedUser = localStorage.getItem('family_ledger_user');
        state.currentUser = savedUser && state.users.includes(savedUser) ? savedUser : state.users[0];
        updateUIForUser();
        
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                this.parentNode.querySelectorAll('.category-btn').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                state.currentCategory = this.dataset.cat;
            });
        });

        connectWebSocket();
    });

    /* =====================================================================
       [내역 수정/삭제 로직 신규 복구]
       ===================================================================== */
    function confirmDeleteTx(id) {
        uiConfirm("해당 가계부 내역을 정말 삭제하시겠습니까?", async () => {
            try {
                const res = await fetch(`${API_BASE_URL}/api/transactions/${id}`, { method: 'DELETE' });
                if(res.ok) {
                    showToast("삭제 완료!");
                    fetchTransactions();
                } else { showToast("삭제 실패"); }
            } catch(e) { showToast("통신 오류"); }
        });
    }

    function promptEditTx(id, oldAmount, oldMemo) {
        uiPromptNum(`금액 수정 (기존 메모: ${oldMemo})`, oldAmount, async (newAmount) => {
            try {
                const res = await fetch(`${API_BASE_URL}/api/transactions/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount: parseInt(newAmount), memo: oldMemo })
                });
                if(res.ok) {
                    showToast("수정 완료!");
                    fetchTransactions();
                } else { showToast("수정 실패"); }
            } catch(e) { showToast("통신 오류"); }
        });
    }

    /* =====================================================================
       [유저 모달 및 관리]
       ===================================================================== */
    function updateUIForUser() {
        document.getElementById('current-user-name').innerText = state.currentUser;
        document.getElementById('stats-user-name').innerText = state.currentUser;
        localStorage.setItem('family_ledger_user', state.currentUser);
        renderList();
    }

    function openUserModal() {
        const listEl = document.getElementById('user-list');
        listEl.innerHTML = '';
        state.users.forEach(u => {
            const isSelected = u === state.currentUser;
            const mappedId = Object.keys(state.kakaoMap).find(key => state.kakaoMap[key] === u);
            const kakaoBtnClass = mappedId ? 'bg-green-500 text-white' : 'bg-[#FEE500] text-[#191919]';
            const kakaoBtnText = mappedId ? '카톡완료' : '카톡연동';

            listEl.innerHTML += `
                <div class="flex items-center justify-between p-3 sm:p-4 rounded-xl border-2 ${isSelected ? 'border-[#FEE500] bg-[#FFF8B3] dark:bg-[#4A4315]' : 'border-gray-200 bg-white dark:bg-[#191919] dark:border-gray-600'}">
                    <div onclick="setUser('${u}')" class="flex-1 text-left text-xl sm:text-2xl font-black cursor-pointer ${isSelected ? 'text-[#191919] dark:text-[#FEE500]' : 'text-gray-700 dark:text-gray-300'} whitespace-nowrap overflow-hidden text-ellipsis">
                        ${isSelected ? '✅ ' : ''}${u}
                    </div>
                    <div class="flex items-center gap-2 shrink-0">
                        <button onclick="promptKakaoId(event, '${u}')" class="text-xs sm:text-sm ${kakaoBtnClass} px-3 py-2 rounded-lg font-bold shadow-sm whitespace-nowrap transition">${kakaoBtnText}</button>
                        ${state.users.length > 1 ? `
                        <button onclick="handleDeleteUser(event, '${u}')" class="text-red-500 px-3 py-2 bg-red-50 dark:bg-red-900/30 rounded-lg active:bg-red-100 dark:active:bg-red-800 transition">
                            <i class="fa-solid fa-trash text-lg"></i>
                        </button>` : ''}
                    </div>
                </div>
            `;
        });
        document.getElementById('user-modal').classList.remove('hidden');
    }

    function closeUserModal() { document.getElementById('user-modal').classList.add('hidden'); }

    function promptKakaoId(e, name) {
        e.stopPropagation();
        const existingId = Object.keys(state.kakaoMap).find(key => state.kakaoMap[key] === name) || '';
        const inputId = prompt(`[${name}]님의 카카오톡 고유 ID를 입력해주세요.\n(챗봇에 금액입력 시 안내받은 영문/숫자 조합)`, existingId);
        if(inputId !== null) {
            for (let key in state.kakaoMap) { if(state.kakaoMap[key] === name) delete state.kakaoMap[key]; }
            if(inputId.trim() !== '') { state.kakaoMap[inputId.trim()] = name; }
            saveSettings('kakao_map', state.kakaoMap);
            openUserModal(); showToast("카카오톡 연동 완료!");
        }
    }

    function setUser(name) { state.currentUser = name; updateUIForUser(); closeUserModal(); }

    async function addUser() {
        const nameInput = document.getElementById('new-user-name');
        const name = nameInput.value.trim();
        if(!name || state.users.includes(name)) return;
        state.users.push(name); await saveSettings('users', state.users);
        nameInput.value = ''; openUserModal(); showToast(`${name} 추가됨!`);
    }

    function handleDeleteUser(e, name) {
        e.stopPropagation(); 
        uiConfirm(`[${name}] 가족 구성원을 삭제하시겠습니까?`, async () => {
            state.users = state.users.filter(u => u !== name);
            await saveSettings('users', state.users); 
            if(state.currentUser === name) setUser(state.users[0]); else openUserModal();
        });
    }

    function setType(type) {
        state.currentType = type;
        document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('selected-expense', 'selected-income'));
        const catExpense = document.getElementById('category-expense');
        const catIncome = document.getElementById('category-income');
        document.getElementById('input-fixed').checked = false;

        if(type === 'expense') {
            document.getElementById('btn-type-expense').classList.add('selected-expense');
            catExpense.classList.remove('hidden'); catIncome.classList.add('hidden');
            document.getElementById('label-category').innerText = '어디에 쓰셨나요?';
            state.currentCategory = '식비';
        } else {
            document.getElementById('btn-type-income').classList.add('selected-income');
            catExpense.classList.add('hidden'); catIncome.classList.remove('hidden');
            document.getElementById('label-category').innerText = '어떤 수입인가요?';
            state.currentCategory = '월급';
        }
    }

    async function uploadReceipt(inputElement) {
        const file = inputElement.files[0];
        if(!file) return;
        showToast("📸 사진 분석 중...");
        const formData = new FormData(); formData.append("file", file);
        try {
            const response = await fetch(`${API_BASE_URL}/api/ocr`, { method: 'POST', body: formData });
            const data = await response.json();
            if(data.success) {
                document.getElementById('input-amount').value = data.amount;
                document.getElementById('input-memo').value = data.memo;
                showToast("✅ 영수증 인식 성공!");
            } else { showToast("❌ 분석 실패"); }
        } catch(error) { showToast("통신 에러"); }
        inputElement.value = '';
    }

    async function saveData() {
        const amount = document.getElementById('input-amount').value;
        if(!amount) return showToast("금액을 입력해주세요!");
        const newTx = {
            user: state.currentUser,
            date: document.getElementById('input-date').value,
            type: state.currentType,
            category: state.currentCategory,
            amount: parseInt(amount),
            memo: document.getElementById('input-memo').value,
            is_fixed: document.getElementById('input-fixed').checked,
            vehicle_id: null
        };
        try {
            const response = await fetch(`${API_BASE_URL}/api/transactions`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(newTx)
            });
            if (response.ok) {
                document.getElementById('input-amount').value = '';
                document.getElementById('input-memo').value = '';
                showToast("✅ 서버에 저장 완료!");
                await fetchTransactions(); 
                setTimeout(() => switchTab('list'), 800);
            } else { showToast("❌ 저장 오류"); }
        } catch (error) { showToast("❌ 연결 실패"); }
    }

    function renderList() {
        const myData = state.transactions.filter(t => t.user === state.currentUser);
        
        let expTotal = 0; let incTotal = 0;
        const listEl = document.getElementById('transaction-list');
        listEl.innerHTML = '';
        let expenseChartData = {};

        if(myData.length === 0) {
            listEl.innerHTML = `<div class="text-center py-10 text-gray-500 dark:text-gray-400 font-bold">서버에 기록된 내역이 없습니다.</div>`;
        }

        myData.forEach(t => {
            const isFixedVal = t.is_fixed === 1 || t.is_fixed === true;
            if(t.type === 'expense') {
                expTotal += t.amount;
                expenseChartData[t.category] = (expenseChartData[t.category] || 0) + t.amount;
            } else { incTotal += t.amount; }
            
            const isExp = t.type === 'expense';
            const color = isExp ? 'red' : 'blue';
            const sign = isExp ? '-' : '+';
            const fixedBadge = isFixedVal ? `<span class="ml-2 text-sm bg-${color}-100 dark:bg-${color}-900 text-${color}-700 dark:text-${color}-200 px-2 py-1 rounded-md align-middle whitespace-nowrap"><i class="fa-solid fa-thumbtack mr-1"></i>고정</span>` : '';

            // [수정] 삭제 및 수정 버튼 UI 추가
            listEl.innerHTML += `
                <div class="bg-white dark:bg-[#191919] rounded-xl shadow-md p-4 sm:p-5 mb-4 border-l-8 border-${color}-500 transition-colors flex flex-col gap-1">
                    <div class="flex justify-between items-start">
                        <div class="text-gray-500 dark:text-gray-400 text-sm sm:text-base font-black flex items-center whitespace-nowrap">
                            ${t.date} ${fixedBadge}
                        </div>
                        <div class="flex gap-2">
                            <button onclick="promptEditTx(${t.id}, ${t.amount}, '${t.memo || ''}')" class="text-blue-500 bg-blue-50 dark:bg-blue-900/30 p-2 rounded-lg transition active:bg-blue-100"><i class="fa-solid fa-pen"></i></button>
                            <button onclick="confirmDeleteTx(${t.id})" class="text-red-500 bg-red-50 dark:bg-red-900/30 p-2 rounded-lg transition active:bg-red-100"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                    <div class="text-xl sm:text-2xl font-black dark:text-white truncate w-full">${t.category} <span class="text-base sm:text-lg text-gray-500 dark:text-gray-400 font-bold ml-1">${t.memo || ''}</span></div>
                    <div class="text-2xl sm:text-3xl font-black text-${color}-600 dark:text-${color}-400 mt-1 whitespace-nowrap">${sign} ${t.amount.toLocaleString()}원</div>
                </div>
            `;
        });

        document.getElementById('total-expense').innerHTML = `${expTotal.toLocaleString()}<span class="text-base sm:text-lg font-bold text-gray-500 dark:text-gray-400 ml-1">원</span>`;
        document.getElementById('total-income').innerHTML = `${incTotal.toLocaleString()}<span class="text-base sm:text-lg font-bold text-gray-500 dark:text-gray-400 ml-1">원</span>`;
        
        drawPieChart(expenseChartData);
    }

    function drawPieChart(dataObj) {
        const ctx = document.getElementById('expensePieChart');
        if(!ctx) return;
        if(pieChartInstance) pieChartInstance.destroy();
        if(Object.values(dataObj).length === 0) { ctx.style.display = 'none'; return; }
        ctx.style.display = 'block';
        pieChartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: Object.keys(dataObj), datasets: [{ data: Object.values(dataObj), backgroundColor: ['#ef4444', '#f97316', '#eab308', '#22c55e', '#3b82f6', '#8b5cf6'], borderWidth: state.isDarkMode ? 2 : 0, borderColor: state.isDarkMode ? '#191919' : '#fff' }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
        });
    }

    function downloadExcel() {
        const myData = state.transactions.filter(t => t.user === state.currentUser);
        if(myData.length === 0) return showToast("데이터가 없습니다.");
        let csvContent = "data:text/csv;charset=utf-8,\uFEFF날짜,구분,카테고리,금액,메모\n";
        myData.forEach(t => csvContent += `${t.date},${t.type==='expense'?'지출':'수입'},${t.category},${t.amount},${t.memo||''}\n`);
        const link = document.createElement("a"); link.setAttribute("href", encodeURI(csvContent)); link.setAttribute("download", `${state.currentUser}_가계부.csv`);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }

    /* =====================================================================
       [탭 3 (차량 관리)]
       ===================================================================== */
    function renderCar() {
        const selectEl = document.getElementById('vehicle-select');
        selectEl.innerHTML = '';
        if(state.vehicles.length === 0) {
            document.getElementById('car-content').classList.add('hidden');
            document.getElementById('no-car-message').classList.remove('hidden');
            state.currentVehicleId = null; return;
        }
        document.getElementById('car-content').classList.remove('hidden');
        document.getElementById('no-car-message').classList.add('hidden');
        state.vehicles.forEach(v => selectEl.innerHTML += `<option value="${v.id}">${v.name}</option>`);
        if(!state.currentVehicleId || !state.vehicles.find(v => v.id == state.currentVehicleId)) state.currentVehicleId = state.vehicles[0].id;
        selectEl.value = state.currentVehicleId; drawVehicleDetails();
    }

    function changeVehicle(id) { state.currentVehicleId = parseInt(id); drawVehicleDetails(); }

    function drawVehicleDetails() {
        const car = state.vehicles.find(v => v.id === state.currentVehicleId);
        if(!car) return;
        document.getElementById('display-car-name').innerText = car.name;
        document.getElementById('display-car-plate').innerText = car.plate;
        document.getElementById('car-current-km').value = car.currentKm;
        
        const listEl = document.getElementById('consumables-list'); listEl.innerHTML = '';
        car.consumables.forEach(c => {
            const usedKm = car.currentKm - c.lastKm;
            const percent = Math.min(Math.round((usedKm / c.cycle) * 100), 100);
            let statusColor = 'green'; let statusText = '양호';
            if (percent >= 90) { statusColor = 'red'; statusText = '교체 임박!'; } else if (percent >= 70) { statusColor = 'orange'; statusText = '점검 필요'; }

            listEl.innerHTML += `
                <div class="bg-white dark:bg-[#191919] p-4 sm:p-5 rounded-2xl shadow-md mb-4 border-2 border-gray-100 dark:border-gray-700 transition-colors">
                    <div class="flex justify-between items-end mb-2 sm:mb-3">
                        <div class="shrink min-w-0 pr-2">
                            <h4 class="text-xl sm:text-2xl font-black text-[#191919] dark:text-gray-200 whitespace-nowrap overflow-hidden text-ellipsis"><i class="fa-solid ${c.icon} text-gray-600 dark:text-gray-400 mr-1.5 w-6 sm:w-8"></i>${c.name}</h4>
                            <p class="text-sm sm:text-base font-bold text-gray-500 dark:text-gray-400 mt-1 sm:mt-2">권장: ${c.desc}</p>
                        </div>
                        <div class="text-right shrink-0">
                            <p class="text-${statusColor}-500 font-black text-xl sm:text-2xl">${statusText}</p>
                            <p class="text-xs sm:text-sm font-bold text-gray-400 mt-1 sm:mt-2 cursor-pointer bg-gray-100 dark:bg-gray-700 px-2 py-1 sm:px-3 sm:py-2 rounded-lg" onclick="editLastKm('${c.id}')">최근: <strong class="text-[#191919] dark:text-white">${c.lastKm.toLocaleString()}</strong>km <i class="fa-solid fa-pen ml-1"></i></p>
                        </div>
                    </div>
                    <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-5 sm:h-6 mt-3 sm:mt-4 overflow-hidden border-2 border-gray-300 dark:border-gray-600 shadow-inner">
                        <div class="bg-${statusColor}-500 h-5 sm:h-6 rounded-full progress-bar-fill relative" style="width: ${percent}%"></div>
                    </div>
                    <button onclick="uiConfirmReplaceConsumable('${c.id}')" class="mt-4 sm:mt-5 w-full py-3 sm:py-4 bg-white dark:bg-gray-700 border-2 border-gray-300 dark:border-gray-600 text-[#191919] dark:text-white font-black rounded-xl active:bg-gray-100 flex justify-center items-center gap-2 transition text-base sm:text-lg shadow-sm whitespace-nowrap">
                        <i class="fa-solid fa-wrench"></i> 이 항목 오늘 교체했어요
                    </button>
                </div>
            `;
        });
    }

    async function updateMileage() {
        const km = parseInt(document.getElementById('car-current-km').value);
        if(!km) return;
        state.vehicles.find(v => v.id === state.currentVehicleId).currentKm = km; 
        await saveSettings('vehicles', state.vehicles); drawVehicleDetails(); showToast("업데이트 됨!");
    }

    function uiConfirmReplaceConsumable(cId) {
        const inputKm = parseInt(document.getElementById('car-current-km').value);
        if(!inputKm) return showToast("현재 주행거리를 먼저 입력해주세요.");
        uiConfirm(`현재 주행거리인 [${inputKm.toLocaleString()}km] 기준으로 교체하셨나요?`, async () => {
            const car = state.vehicles.find(v => v.id === state.currentVehicleId);
            const item = car.consumables.find(c => c.id === cId);
            car.currentKm = inputKm; item.lastKm = inputKm;   
            await saveSettings('vehicles', state.vehicles); drawVehicleDetails(); showToast("교체 완료!");
        });
    }

    function editLastKm(cId) {
        const car = state.vehicles.find(v => v.id === state.currentVehicleId);
        const item = car.consumables.find(c => c.id === cId);
        uiPromptNum(`[${item.name}] 마지막 교체 주행거리`, item.lastKm, async (newKm) => {
            item.lastKm = newKm; await saveSettings('vehicles', state.vehicles); drawVehicleDetails();
        });
    }

    async function executeAddVehicle() {
        const name = document.getElementById('prompt-car-name').value.trim();
        const plate = document.getElementById('prompt-car-plate').value.trim();
        if(!name) return showToast("이름을 입력해주세요.");
        const newCar = { id: Date.now(), name: name, plate: plate || '미등록', currentKm: 0, consumables: JSON.parse(JSON.stringify(defaultConsumables)) };
        state.vehicles.push(newCar); state.currentVehicleId = newCar.id;
        await saveSettings('vehicles', state.vehicles); closePromptCar(); renderCar(); showToast("등록 완료!");
    }

    function uiConfirmDeleteVehicle() {
        if(state.vehicles.length === 0) return;
        uiConfirm(`차량을 완전히 삭제하시겠습니까?`, async () => {
            state.vehicles = state.vehicles.filter(v => v.id !== state.currentVehicleId);
            state.currentVehicleId = state.vehicles.length > 0 ? state.vehicles[0].id : null;
            await saveSettings('vehicles', state.vehicles); renderCar(); showToast("삭제됨");
        });
    }

    /* =====================================================================
       [UI 유틸리티 모달들]
       ===================================================================== */
    function toggleDarkMode() {
        state.isDarkMode = !state.isDarkMode;
        const htmlNode = document.documentElement; const icon = document.getElementById('dark-mode-icon');
        if (state.isDarkMode) { htmlNode.classList.add('dark'); icon.classList.replace('fa-moon', 'fa-sun'); localStorage.setItem('family_ledger_theme', 'dark'); } 
        else { htmlNode.classList.remove('dark'); icon.classList.replace('fa-sun', 'fa-moon'); localStorage.setItem('family_ledger_theme', 'light'); }
        if(pieChartInstance) { Chart.defaults.color = state.isDarkMode ? '#e2e8f0' : '#191919'; pieChartInstance.update(); }
    }
    function initTheme() { if (localStorage.getItem('family_ledger_theme') === 'dark') toggleDarkMode(); }
    function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 2000); }
    let confirmCallback = null;
    function uiConfirm(msg, callback) { document.getElementById('confirm-msg').innerText = msg; document.getElementById('custom-confirm').classList.remove('hidden'); confirmCallback = callback; }
    function closeConfirmModal() { document.getElementById('custom-confirm').classList.add('hidden'); }
    document.getElementById('confirm-ok-btn').addEventListener('click', () => { closeConfirmModal(); if(confirmCallback) confirmCallback(); });
    let numPromptCallback = null;
    function uiPromptNum(title, defaultVal, callback) { document.getElementById('prompt-num-title').innerText = title; document.getElementById('prompt-num-input').value = defaultVal; document.getElementById('custom-prompt-num').classList.remove('hidden'); document.getElementById('prompt-num-input').focus(); numPromptCallback = callback; }
    function closePromptNum() { document.getElementById('custom-prompt-num').classList.add('hidden'); }
    document.getElementById('prompt-num-ok-btn').addEventListener('click', () => { const val = document.getElementById('prompt-num-input').value; if(val !== "") { closePromptNum(); if(numPromptCallback) numPromptCallback(val); } });
    function uiPromptAddVehicle() { document.getElementById('prompt-car-name').value = ''; document.getElementById('prompt-car-plate').value = ''; document.getElementById('custom-prompt-car').classList.remove('hidden'); }
    function closePromptCar() { document.getElementById('custom-prompt-car').classList.add('hidden'); }
</script>
</body>
</html>
